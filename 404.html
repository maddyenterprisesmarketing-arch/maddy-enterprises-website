<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maddy Enterprises | Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 0;
    }

    .error-card {
      width: min(100%, 720px);
      border-radius: 32px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      text-align: center;
    }

    .error-card h1 {
      margin: 18px 0 12px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .error-card p {
      margin: 0 auto 24px;
      max-width: 56ch;
      line-height: 1.8;
      color: rgba(27, 27, 27, 0.72);
    }
  </style>
</head>
<body>
  <main class="error-page">
    <section class="error-card">
      <span class="badge">404</span>
      <h1>Page not found</h1>
      <p>The page you were looking for does not exist. Use the button below to return to the home page and continue browsing the site.</p>
      <a class="btn btn--primary btn-ripple" href="index.html">Back to Home</a>
    </section>
  </main>
</body>
</html>
